<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250">
    <defs>
        <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00d4ff" />
            <stop offset="100%" stop-color="#ff0080" />
        </linearGradient>
        <filter id="avatarGlow">
            <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <circle cx="125" cy="125" r="110" fill="#0a0a0a" stroke="url(#neonGradient)" stroke-width="8" filter="url(#avatarGlow)" />
    <path d="M 65 230 C 65 160, 185 160, 185 230" fill="none" stroke="url(#neonGradient)" stroke-width="12" stroke-linecap="round" />
    <path d="M 90 140 C 90 80, 160 80, 160 140" fill="none" stroke="url(#neonGradient)" stroke-width="12" stroke-linecap="round" />
    <rect x="100" y="115" width="50" height="16" rx="6" fill="#00d4ff" filter="url(#avatarGlow)" />
</svg>